<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0078D7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="RSU">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Iniciar Sesión | RSU App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { getCurrentSession, supabase } from './supabase-config.js';

        async function manejarLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');

            // Mostrar estado de carga
            loader.classList.remove('hidden');
            btnText.innerText = 'Verificando...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('next') || 'dashboard.html';

            } catch (error) {
                alert("Error de acceso: " + error.message);
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = 'Entrar al Sistema';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const session = await getCurrentSession();
            if (session?.user) {
                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('next') || 'dashboard.html';
                return;
            }

            document.getElementById('login-form').addEventListener('submit', manejarLogin);
        });
    </script>

    <style>
        .bg-rsu-dark { background-color: #174836; }
        .bg-rsu-accent { background-color: #A43107; }
        .bg-rsu-gold { background-color: #EDC34F; }
        .bg-rsu-neutral { background-color: #DBD0B4; }
        .focus-rsu:focus { border-color: #174836; ring-color: #174836; }
    </style>
    <link rel="stylesheet" href="rsu-aero.css">
</head>
<body class="auth-page flex items-center justify-center min-h-screen p-6 font-sans">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-11 h-11 rounded-lg border border-slate-200 bg-white mb-4">
                <i class="fas fa-recycle text-green-600 text-xl"></i>
            </div>
            <h1 class="text-slate-950 text-3xl font-black tracking-tight">RSU App</h1>
            <p class="text-slate-500 text-sm mt-2">Marketplace de gestión de residuos</p>
        </div>

        <div class="auth-card bg-white rounded-xl shadow-2xl overflow-hidden border border-slate-200">
            <form id="login-form" class="p-8">
                
                <h2 class="text-slate-900 text-lg font-bold mb-8 flex justify-between items-center">
                    <span>Acceso de usuario</span>
                    <i class="fas fa-user-shield text-slate-400"></i>
                </h2>
                
                <div class="mb-6">
                    <label class="block text-xs font-semibold text-slate-500 mb-2">Email institucional</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-envelope text-xs"></i>
                        </span>
                        <input type="email" id="email" required 
                            class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded focus-rsu outline-none text-sm bg-slate-50" 
                            placeholder="usuario@empresa.com">
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-xs font-semibold text-slate-500 mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-key text-xs"></i>
                        </span>
                        <input type="password" id="password" required 
                            class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded focus-rsu outline-none text-sm bg-slate-50" 
                            placeholder="********">
                    </div>
                    <div class="text-right mt-2">
                        <a href="recuperar-password.html" class="text-[10px] font-bold text-rsu-accent hover:underline uppercase">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

                <button type="submit" class="w-full bg-rsu-dark text-white font-black py-4 rounded focus:outline-none hover:bg-opacity-90 transition transform active:scale-95 text-sm flex justify-center items-center gap-3 shadow-lg">
                    <i id="loader" class="fas fa-circle-notch animate-spin hidden"></i>
                    <span id="btn-text">Entrar al Sistema</span>
                </button>

                <div class="mt-8 text-center border-t border-slate-100 pt-6">
                    <p class="text-slate-500 text-sm font-medium">
                        ¿No tienes cuenta?
                        <a href="registro.html" class="text-rsu-accent hover:underline">Regístrate aquí</a>
                    </p>
                </div>
            </form>
        </div>

        <div class="text-center mt-6">
            <a href="index.html" class="text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-slate-900 transition">
                <i class="fas fa-arrow-left mr-1"></i> Volver al mercado
            </a>
        </div>
    </div>
    <script type="module" src="app-preferences.js"></script>
    <script src="pwa-register.js"></script>
</body>
</html>
