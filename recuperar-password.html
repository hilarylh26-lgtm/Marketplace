<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0078D7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="RSU">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Recuperar Contraseña | RSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="rsu-aero.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <main class="glass w-full max-w-md p-8">
        <div class="text-center mb-8">
            <i class="fas fa-key text-white text-4xl drop-shadow-md"></i>
            <h1 class="text-3xl font-black text-white uppercase italic mt-3">Recuperar Acceso</h1>
            <p class="text-xs text-blue-900 font-bold uppercase tracking-widest mt-2">Te enviaremos un enlace a tu correo</p>
        </div>

        <form id="reset-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-blue-500 uppercase mb-2">Email registrado</label>
                <input id="reset-email" type="email" required placeholder="usuario@empresa.com" class="w-full px-4 py-3 border border-blue-100 text-sm font-bold outline-none">
            </div>
            <button type="submit" class="w-full glossy-btn text-blue-900 font-black py-4 rounded-full uppercase text-xs tracking-[0.2em]">
                Enviar enlace
            </button>
        </form>

        <a href="login.html" class="block text-center mt-6 text-[10px] font-black text-blue-900 uppercase tracking-widest hover:underline">
            <i class="fas fa-arrow-left mr-1"></i> Volver al login
        </a>
    </main>

    <script type="module">
        import { supabase } from './supabase-config.js';

        document.getElementById('reset-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('reset-email').value;
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/login.html'
            });

            if (error) {
                alert('No se pudo enviar el enlace: ' + error.message);
                return;
            }

            alert('Revisa tu correo para continuar con la recuperación.');
            window.location.href = 'login.html';
        });
    </script>
    <script type="module" src="app-preferences.js"></script>
    <script src="pwa-register.js"></script>
</body>
</html>
