<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0078D7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="RSU">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Registro de Empresa | RSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- CONEXIÓN A SUPABASE -->
    <script type="module">
        import { supabase } from './supabase-config.js';


        async function manejarRegistro(event) {
            event.preventDefault(); 

            // Referencias a los campos
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const nombreUsuario = document.getElementById('nombreUsuario').value.trim();
            const razonSocial = document.getElementById('razonSocial').value;
            const rfc = document.getElementById('rfc_input').value;
            const actividad = document.getElementById('actividad').value;
            const padron = document.getElementById('padron').value;

            // Validación de contraseña
            if (password !== confirmPassword) {
                alert("Las contraseñas no coinciden");
                return;
            }

            try {
                // 1. Crear el usuario en el sistema de autenticación
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            nombre_empresa: razonSocial,
                            nombre_usuario: nombreUsuario,
                            RFC: rfc,
                            tipo_actividad: actividad,
                            registro_padron: padron
                        }
                    }
                });

                if (authError) throw authError;

                if (authData.session) {
                    let { error: profileError } = await supabase
                        .from('perfiles')
                        .upsert({
                            id: authData.user.id,
                            nombre_usuario: nombreUsuario,
                            nombre_empresa: razonSocial,
                            RFC: rfc,
                            tipo_actividad: actividad,
                            registro_padron: padron,
                            email: email
                        });

                    if (profileError && profileError.message?.includes('nombre_usuario')) {
                        const fallbackResult = await supabase
                            .from('perfiles')
                            .upsert({
                                id: authData.user.id,
                                nombre_empresa: razonSocial,
                                RFC: rfc,
                                tipo_actividad: actividad,
                                registro_padron: padron,
                                email: email
                            });
                        profileError = fallbackResult.error;
                    }
                    
                    if (profileError) throw profileError;
                }

                alert("¡Registro exitoso! Revisa tu correo para confirmar tu cuenta antes de iniciar sesión.");
                window.location.href = 'login.html';

            } catch (error) {
                alert("Error de registro: " + error.message);
                console.error("Detalle técnico:", error);
            }
        }

        // Inicializar evento al cargar el DOM
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registro-form');
            if(form) {
                form.addEventListener('submit', manejarRegistro);
            }
        });
    </script>

    <style>
        .bg-rsu-dark { background-color: #174836; }
        .text-rsu-accent { color: #A43107; }
        .bg-rsu-accent { background-color: #A43107; }
        .bg-rsu-gold { background-color: #EDC34F; }
        .bg-rsu-neutral { background-color: #DBD0B4; }
        .border-rsu-gold { border-color: #EDC34F; }
        .focus-rsu:focus { border-color: #174836; ring-color: #174836; }
    </style>
    <link rel="stylesheet" href="rsu-aero.css">
</head>
<body class="bg-rsu-dark flex items-center justify-center min-h-screen p-6 font-sans">

    <div class="w-full max-w-2xl">
        <div class="text-center mb-8">
            <h1 class="text-white text-4xl font-black tracking-tighter uppercase italic">RSU<span class="text-rsu-gold text-xl not-italic ml-2">App</span></h1>
            <p class="text-rsu-neutral text-sm mt-2 opacity-80 uppercase tracking-widest">Plataforma de Gestión y Marketplace de Residuos</p>
        </div>

        <div class="bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-rsu-accent">
            <form id="registro-form" class="p-8">
                
                <h2 class="text-slate-800 text-xs font-black uppercase mb-6 tracking-widest border-b-2 pb-2 border-rsu-neutral flex justify-between items-center">
                    <span>Identificación de Entidad</span>
                    <i class="fas fa-building text-rsu-dark"></i>
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nombre visible del usuario</label>
                        <input type="text" id="nombreUsuario" required class="w-full px-4 py-2 border border-slate-200 rounded focus-rsu outline-none text-sm bg-slate-50" placeholder="Tu nombre o nombre comercial visible">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Nombre o Razón Social</label>
                        <input type="text" id="razonSocial" required class="w-full px-4 py-2 border border-slate-200 rounded focus-rsu outline-none text-sm bg-slate-50" placeholder="Nombre de la empresa o negocio">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">RFC / Identificación Fiscal</label>
                        <input type="text" id="rfc_input" required class="w-full px-4 py-2 border border-slate-200 rounded focus-rsu outline-none uppercase text-sm font-mono bg-slate-50" placeholder="ABCD123456XYZ">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo de Actividad</label>
                        <select id="actividad" class="w-full px-4 py-2 border border-slate-200 rounded focus-rsu outline-none text-sm bg-white cursor-pointer">
                            <option value="Generador">Generador de RSU</option>
                            <option value="Reciclador">Planta de Reciclaje / Acopio</option>
                            <option value="Transportista">Transportista Logístico</option>
                            <option value="Gestor">Gestor Ambiental</option>
                            <option value="Independiente">Comerciante Independiente</option>
                        </select>
                    </div>

                    <div class="md:col-span-2 bg-rsu-neutral/20 p-4 rounded-lg border-l-4 border-rsu-gold">
                        <label class="block text-[10px] font-bold text-rsu-dark uppercase mb-1">Número de Registro en el Padrón (Si aplica)</label>
                        <div class="flex gap-2">
                            <input type="text" id="padron" class="w-full px-4 py-2 border border-white rounded focus-rsu outline-none text-sm placeholder:italic" placeholder="Ej. RNPG-SLP-00X...">
                            <div class="flex items-center text-rsu-dark">
                                <i class="fas fa-info-circle"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <h2 class="text-slate-800 text-xs font-black uppercase mb-6 tracking-widest border-b-2 pb-2 border-rsu-neutral flex justify-between items-center">
                    <span>Acceso y Seguridad</span>
                    <i class="fas fa-lock text-rsu-dark"></i>
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Email Institucional</label>
                        <input type="email" id="email" required class="w-full px-4 py-2 border border-slate-200 rounded focus-rsu outline-none text-sm bg-slate-50" placeholder="contacto@empresa.com">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Contraseña</label>
                        <input type="password" id="password" required class="w-full px-4 py-2 border border-slate-200 rounded focus-rsu outline-none text-sm bg-slate-50" placeholder="********">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" required class="w-full px-4 py-2 border border-slate-200 rounded focus-rsu outline-none text-sm bg-slate-50" placeholder="********">
                    </div>
                </div>

                <div class="flex flex-col md:flex-row items-center gap-6">
                    <button type="submit" class="w-full md:w-auto bg-rsu-accent text-white font-black px-12 py-4 rounded-full hover:scale-105 transition transform uppercase text-xs tracking-[0.2em] shadow-lg">
                        Finalizar Registro
                    </button>
                    <a href="login.html" class="text-slate-400 text-xs font-bold hover:text-rsu-dark transition underline decoration-rsu-gold decoration-2 underline-offset-4">
                        Ya tengo cuenta, ir al Login
                    </a>
                </div>
            </form>

            <div class="bg-rsu-neutral p-4 flex items-center gap-4">
                <div class="bg-white p-2 rounded-full shadow-sm">
                    <i class="fas fa-shield-check text-rsu-dark text-lg"></i>
                </div>
                <p class="text-[10px] text-rsu-dark leading-relaxed uppercase font-black opacity-80">
                    Sistema de Transparencia RSU: Los datos serán validados ante el padrón estatal.
                </p>
            </div>
        </div>
    </div>
    <script type="module" src="app-preferences.js"></script>
    <script src="pwa-register.js"></script>
</body>
</html>
