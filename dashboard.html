<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0078D7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="RSU">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Monitor de Transacciones | RSU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rsu_dark: '#174836',
                        rsu_accent: '#A43107',
                        rsu_gold: '#EDC34F',
                        rsu_base: '#DBD0B4',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfaf5; }
        .stat-card { border-left: 4px solid #32CD32; }
    </style>
    <link rel="stylesheet" href="rsu-aero.css">
</head>
<body class="text-gray-800">
    <nav class="bg-rsu_dark text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <i class="fas fa-recycle text-rsu_gold text-2xl"></i>
                <span class="font-black text-2xl tracking-tighter uppercase">RSU</span>
            </div>
            <div class="flex gap-6 text-xs font-bold items-center uppercase tracking-widest">
                <a href="index.html" class="hover:text-rsu_gold transition">Inicio</a>
                <a href="publicar.html" class="hover:text-rsu_gold transition">Publicar</a>
                <a href="transacciones.html" class="hover:text-rsu_gold transition">Transacciones</a>
                <a href="perfil_empresa.html" class="flex items-center gap-2 bg-white/20 px-3 py-2 rounded-full border border-white/30">
                    <i class="fas fa-user-circle text-rsu_gold"></i> <span id="dashboard-user">Perfil</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <header class="mb-10">
            <h1 class="text-3xl font-black text-rsu_dark italic uppercase">Monitor de <span class="text-rsu_accent">Transacciones</span></h1>
            <p id="dashboard-region" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-1">Panel de control operativo</p>
            <div id="kpi-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8">
                <div class="bg-white p-5 rounded-xl border border-rsu_base stat-card shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Cargando</p>
                    <p class="text-2xl font-black text-rsu_dark italic">...</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <h2 class="text-xs font-black text-rsu_dark uppercase tracking-widest border-b border-rsu_base pb-2 flex items-center gap-2">
                    <i class="fas fa-truck-loading text-rsu_accent"></i> Actividad Reciente
                </h2>
                <div id="operations-list" class="space-y-4">
                    <div class="bg-white rounded-xl border border-rsu_base p-6 text-center text-xs font-black text-slate-400 uppercase">
                        Cargando operaciones...
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-xs font-black text-rsu_dark uppercase tracking-widest border-b border-rsu_base pb-2 flex items-center gap-2">
                    <i class="fas fa-bell text-rsu_gold"></i> Alertas del Sistema
                </h2>
                <div id="alerts-list" class="space-y-4">
                    <div class="bg-slate-100 p-4 rounded-lg border border-rsu_base">
                        <p class="text-[10px] font-black text-rsu_dark uppercase mb-1">Cargando alertas</p>
                        <p class="text-xs font-medium text-slate-700">Revisando tus transacciones y publicaciones.</p>
                    </div>
                </div>

                <div class="bg-rsu_dark text-white p-6 rounded-xl shadow-lg relative overflow-hidden">
                    <i class="fas fa-leaf absolute -right-4 -bottom-4 text-6xl text-white/10"></i>
                    <h4 class="font-black italic text-lg uppercase mb-2">Impacto RSU</h4>
                    <p id="impact-summary" class="text-xs text-rsu_base leading-relaxed">Calculando impacto ambiental...</p>
                    <button id="download-report" class="mt-4 bg-rsu_gold text-rsu_dark font-black px-4 py-2 rounded text-[9px] uppercase tracking-tighter">Descargar Reporte Ambiental</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="dashboard.js"></script>
    <script type="module" src="app-preferences.js"></script>
    <script src="pwa-register.js"></script>
</body>
</html>
